<!DOCTYPE html>
<html lang="es">
  <head>
    <title id="title"></title>

    <!-- Meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="The First Dungeon - Un RPG de acción 2D con mundo de píxeles lleno de aventuras. ¡Juega gratis en Delta Chat!">
    <meta name="keywords" content="2D, rpg, game, puzzle, pixel, adventure, webxdc, delta-chat">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="./assets/favicon.ico" />
    
    <!-- Webxdc API (must be loaded first) -->
    <script src="webxdc.js"></script>

    <!-- Preload critical assets -->
    <link rel="preload" href="assets/ui/style.css" as="style">
    <link rel="preload" href="assets/main.css" as="style">

    <!-- Style -->
    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Varela+Round&display=swap" />
    <link rel="stylesheet" href="assets/ui/style.css">
    <link rel="stylesheet" href="assets/main.css">

    <!-- Scripts -->
    <script src="vendor/jquery.min.js" crossorigin="anonymous"></script>
    <script src="vendor/pixi.min.js" crossorigin="anonymous"></script>
    <script src="src/constants.min.js"></script>
    <script src="src/utils.min.js"></script>
    <script src="src/visual_effects.js"></script>
    <script src="src/map.min.js"></script>
    <script src="src/entity/entity.min.js"></script>
    <script src="src/entity/monster.min.js"></script>
    <script src="src/entity/player.min.js"></script>
    <script src="src/interface.min.js"></script>
    <script src="src/main.min.js"></script>
    <script src="src/game.min.js"></script>
  <body id="root">

    <!-- Loading overlay -->
    <div id="initial-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999;">
      <div style="text-align:center;color:white;font-family:'Varela Round',sans-serif;">
        <div style="font-size:24px;margin-bottom:20px;">🎮 The First Dungeon</div>
        <div style="width:200px;height:4px;background:#333;border-radius:2px;overflow:hidden;">
          <div id="loader-bar" style="width:0%;height:100%;background:#4CAF50;transition:width 0.3s;"></div>
        </div>
        <div id="loader-text" style="margin-top:10px;font-size:14px;opacity:0.8;">Cargando...</div>
      </div>
    </div>

    <!-- Noscript message -->
    <noscript>
      <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="text-align:center;color:white;font-family:'Varela Round',sans-serif;padding:20px;">
          <h2>⚠️ JavaScript requerido</h2>
          <p>No puedes jugar con JavaScript desactivado. Por favor, actívalo para poder jugar.</p>
        </div>
      </div>
    </noscript>

    <!-- User interface injected here -->
    <main></main>

    <!-- Performance optimization: Remove loader when game is ready -->
    <script>
      window.addEventListener('load', function() {
        const loaderBar = document.getElementById('loader-bar');
        const loaderText = document.getElementById('loader-text');
        if (loaderBar) loaderBar.style.width = '100%';
        if (loaderText) loaderText.textContent = '¡Listo!';
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) loader.style.opacity = '0';
          setTimeout(() => {
            if (loader) loader.remove();
          }, 300);
        }, 500);
      });
    </script>
  </body>
</html>
